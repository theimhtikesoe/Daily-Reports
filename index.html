<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#b6781e" />
  <title>Daily POS Closing & Report System</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .summary-card {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
      border: 1px solid #dee2e6;
    }
    .summary-label {
      font-size: 0.85rem;
      color: #6c757d;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .summary-value {
      font-size: 1.25rem;
      font-weight: bold;
      color: #333;
    }
    .total-highlight {
      background: #e7f1ff;
      border-color: #0d6efd;
    }
    .total-highlight .summary-value {
      color: #0d6efd;
    }
  </style>
</head>
<body>
  <header class="app-header py-4 mb-4">
    <div class="container">
      <div class="header-bar">
        <div class="brand-wrap">
          <img src="/DailyReports.png" alt="Logo" class="brand-logo" />
          <div class="brand-text">
            <h1 class="h3 mb-1">Daily POS Closing &amp; Report System</h1>
            <p class="mb-0 text-muted">Loyverse-integrated daily closing workflow</p>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="container pb-5">
    <div id="message" class="alert d-none" role="alert"></div>

    <section id="reportSection" class="card shadow-sm mb-4">
      <div class="card-body">
        <!-- Date and Sync Row -->
        <div class="d-flex flex-column flex-lg-row align-items-lg-end gap-3 mb-4">
          <div class="flex-grow-1">
            <label for="reportDate" class="form-label fw-bold">Report Date</label>
            <input id="reportDate" type="date" class="form-control" />
          </div>
          <button id="syncButton" class="btn btn-primary px-4">Sync From Loyverse</button>
        </div>

        <!-- Summary Totals Row -->
        <div class="row g-3 mb-4">
          <div class="col-6 col-md-3">
            <div class="summary-card">
              <div class="summary-label">Cash Total</div>
              <input id="cashTotal" type="text" class="summary-value form-control-plaintext text-center" readonly value="฿0.00" />
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="summary-card">
              <div class="summary-label">Card Total</div>
              <input id="cardTotal" type="text" class="summary-value form-control-plaintext text-center" readonly value="฿0.00" />
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="summary-card">
              <div class="summary-label">Transfer Total</div>
              <input id="transferTotal" type="text" class="summary-value form-control-plaintext text-center" readonly value="฿0.00" />
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="summary-card total-highlight">
              <div class="summary-label">Order Total</div>
              <input id="netSale" type="text" class="summary-value form-control-plaintext text-center" readonly value="฿0.00" />
            </div>
          </div>
        </div>

        <!-- Hidden required fields for JS to work -->
        <div class="d-none">
            <input id="totalOrders" type="number" value="0" />
            <input id="expense" type="text" value="0" />
            <input id="tip" type="text" value="0" />
            <input id="oneKBillCount" type="number" value="0" />
            <input id="openingCash" type="text" value="0" />
            <input id="actualCashCounted" type="text" value="0" />
            <input id="expectedCash" type="number" value="0" />
            <input id="difference" type="number" value="0" />
            <input id="safeBoxApplied" type="text" value="0" />
            <button id="loadButton"></button>
            <button id="saveButton"></button>
            <button id="printButton"></button>
            <button id="downloadImageButton"></button>
            <button id="downloadPdfButton"></button>
            <input id="fromDate" type="date" />
            <input id="toDate" type="date" />
            <button id="filterReports"></button>
            <canvas id="netSalesChart"></canvas>
            <div id="unclassifiedHint"></div>
            <table id="reportsTable"><tbody></tbody></table>
        </div>

        <h2 class="h5 mt-4 mb-3 border-start border-4 border-primary ps-2">Order Payment Details</h2>
        <div class="row g-3">
          <div class="col-md-3">
            <div class="detail-box">
              <div class="detail-box-head">
                <span>Cash Entries</span>
                <strong id="cashEntriesTotal">฿0.00</strong>
              </div>
              <ol id="cashEntriesList" class="detail-list mb-0"></ol>
            </div>
          </div>
          <div class="col-md-3">
            <div class="detail-box">
              <div class="detail-box-head">
                <span>Card Entries</span>
                <strong id="cardEntriesTotal">฿0.00</strong>
              </div>
              <ol id="cardEntriesList" class="detail-list mb-0"></ol>
            </div>
          </div>
          <div class="col-md-3">
            <div class="detail-box">
              <div class="detail-box-head">
                <span>Transfer Entries</span>
                <strong id="transferEntriesTotal">฿0.00</strong>
              </div>
              <ol id="transferEntriesList" class="detail-list mb-0"></ol>
            </div>
          </div>
          <div class="col-md-3">
            <div class="detail-box">
              <div class="detail-box-head">
                <span>Discount Entries</span>
                <strong id="discountEntriesTotal">฿0.00</strong>
              </div>
              <ol id="discountEntriesList" class="detail-list mb-0"></ol>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
